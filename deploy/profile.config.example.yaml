model:
  default: ${HERMES_MODEL:-mimo-v2.5}
  provider: ${HERMES_MODEL_PROVIDER:-custom}
  base_url: ${HERMES_MODEL_BASE_URL:-https://example.invalid/v1}
  api_key: ${HERMES_MODEL_API_KEY:-replace_me}
  context_length: 1000000

toolsets:
  - hermes-cli

agent:
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 60
  tool_use_enforcement: auto
  reasoning_effort: medium

terminal:
  backend: local
  cwd: /workspace
  timeout: 180
  persistent_shell: true

browser:
  inactivity_timeout: 120
  command_timeout: 30
  allow_private_urls: false

checkpoints:
  enabled: true
  max_snapshots: 50

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

smart_model_routing:
  enabled: false

api_server:
  enabled: true
  host: 127.0.0.1
  port: 8642

